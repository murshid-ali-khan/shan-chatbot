<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — Shan Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #111118; --surface2: #1a1a24;
      --border: #2a2a3a; --accent: #7c6af7; --accent2: #f76a8a;
      --text: #e8e8f0; --text-muted: #6a6a8a; --glow: rgba(124,106,247,0.15);
    }
    body {
      font-family: 'DM Mono', monospace; background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(124,106,247,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,106,247,0.04) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none;
    }
    .orb { position: fixed; border-radius: 50%; pointer-events: none; filter: blur(80px); }
    .orb1 { width: 400px; height: 400px; top: -100px; right: -100px; background: rgba(124,106,247,0.1); }
    .orb2 { width: 300px; height: 300px; bottom: -80px; left: -80px; background: rgba(247,106,138,0.07); }

    .card {
      position: relative; z-index: 1;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 40px; width: 100%; max-width: 420px;
      margin: 20px; box-shadow: 0 0 60px rgba(0,0,0,0.4);
      animation: slideUp 0.4s ease;
    }
    @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

    .card-header { text-align: center; margin-bottom: 28px; }
    .logo { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; text-decoration: none; }
    .logo-icon {
      width: 40px; height: 40px; border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; box-shadow: 0 0 20px rgba(124,106,247,0.4);
    }
    .logo-text {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    h2 { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    .subtitle { font-size: 12px; color: var(--text-muted); }

    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 11px; color: var(--text-muted); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 6px; }
    input {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px;
      padding: 11px 14px; border-radius: 10px; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--glow); }
    input::placeholder { color: var(--text-muted); }

    .turnstile-wrap {
      display: flex; justify-content: center;
      margin: 16px 0;
    }

    /* Override Turnstile widget to match dark theme */
    .cf-turnstile { filter: invert(0.85) hue-rotate(180deg); border-radius: 8px; overflow: hidden; }

    .btn-submit {
      width: 100%; background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; color: white; font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: 14px; padding: 13px;
      border-radius: 10px; cursor: pointer; margin-top: 4px;
      transition: opacity 0.2s, transform 0.1s; letter-spacing: 0.5px;
    }
    .btn-submit:hover { opacity: 0.88; }
    .btn-submit:active { transform: scale(0.99); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg {
      background: rgba(247,106,138,0.1); border: 1px solid rgba(247,106,138,0.3);
      color: #f76a8a; font-size: 12px; padding: 10px 14px; border-radius: 8px;
      margin-bottom: 14px; display: none;
    }
    .error-msg.show { display: block; }

    .security-note {
      display: flex; align-items: center; gap: 6px;
      font-size: 10px; color: var(--text-muted); margin-top: 12px;
      justify-content: center;
    }

    .footer-link { text-align: center; margin-top: 18px; font-size: 12px; color: var(--text-muted); }
    .footer-link a { color: var(--accent); text-decoration: none; }
    .footer-link a:hover { text-decoration: underline; }

    .back-link {
      position: relative; z-index: 1;
      display: flex; align-items: center; gap: 6px;
      color: var(--text-muted); font-size: 12px; text-decoration: none;
      margin-bottom: 20px; transition: color 0.2s;
    }
    .back-link:hover { color: var(--accent); }
  </style>
</head>
<body>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <a href="/" class="back-link">← Back to home</a>

  <div class="card">
    <div class="card-header">
      <a href="/" class="logo">
        <div class="logo-icon">🤖</div>
        <span class="logo-text">SHAN CHAT</span>
      </a>
      <h2>Create account</h2>
      <p class="subtitle">Start chatting for free today</p>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="cooluser123" maxlength="50"/>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Min. 6 characters"/>
    </div>

    <!-- Cloudflare Turnstile -->
    <!-- IMPORTANT: Replace "YOUR_TURNSTILE_SITE_KEY" with your actual site key from Cloudflare -->
    <div class="turnstile-wrap">
      <div class="cf-turnstile" data-sitekey="0x4AAAAAACoCENPTWewhmm8Q" data-theme="dark"></div>
    </div>

    <button class="btn-submit" id="reg-btn" onclick="doRegister()">CREATE ACCOUNT →</button>

    <div class="security-note">🔒 Protected by Cloudflare Turnstile</div>

    <div class="footer-link">
      Already have an account? <a href="/login">Sign in</a>
    </div>
  </div>

  <script>
    async function doRegister() {
      const username = document.getElementById('username').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('reg-btn');
      const errEl    = document.getElementById('error-msg');

      errEl.classList.remove('show');

      if (!username || !email || !password) { showError('Please fill in all fields'); return; }

      // Get Turnstile token
      const cf_token = document.querySelector('[name="cf-turnstile-response"]')?.value || '';
      if (!cf_token) { showError('Please complete the security check'); return; }

      btn.disabled = true; btn.textContent = 'CREATING ACCOUNT...';

      try {
        const res  = await fetch('/api/register', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password, cf_token })
        });
        const data = await res.json();
        if (data.error) {
          showError(data.error);
          btn.disabled=false; btn.textContent='CREATE ACCOUNT →';
          // Reset turnstile
          if (window.turnstile) window.turnstile.reset();
          return;
        }
        window.location.href = '/chat';
      } catch(e) {
        showError('Network error. Please try again.');
        btn.disabled=false; btn.textContent='CREATE ACCOUNT →';
      }
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg; el.classList.add('show');
    }
  </script>
</body>
</html>
